worker_processes 4;

events {
  worker_connections 1024;
}

http {
  include mime.types;

  default_type  application/octet-stream;

  set_real_ip_from        0.0.0.0/0;
  real_ip_recursive       on;
  real_ip_header          X-Forwarded-For;
  limit_req_zone          $binary_remote_addr zone=mylimit:10m rate=10r/s;

  access_log /dev/stdout;
  error_log /dev/stderr;

  # The public read-only Timeline embed (`/embed/timeline/:anchor`) is meant to be
  # iframed into hub.joby.com launch pages, so it must allow framing from there
  # instead of the global X-Frame-Options: DENY. A per-location add_header is
  # bypassed by the SPA fallback (try_files internally redirects to /index.html,
  # which is served by `location /`), so key the framing headers off $request_uri
  # — it survives the internal redirect — at server level. nginx omits an
  # add_header whose value is the empty string.
  map $request_uri $x_frame_options {
    default     "DENY";
    ~^/embed/   "";
  }
  map $request_uri $embed_csp {
    default     "";
    ~^/embed/   "frame-ancestors 'self' https://hub.joby.com";
  }

  server {
    listen 3000;

    # Security headers
    add_header X-Frame-Options $x_frame_options always;
    add_header Content-Security-Policy $embed_csp always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
      root   /usr/share/nginx/html;
      index  index.html index.htm;
      try_files $uri $uri/ /index.html;
    }
  }
}

