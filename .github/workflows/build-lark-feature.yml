name: Build Lark Feature Images (GHCR)

# Builds the four Plane services we patched for Lark OAuth and pushes them to
# ghcr.io under the JOBYINC org. proxy/live are unmodified and we keep using
# makeplane/plane-proxy:stable + makeplane/plane-live:stable upstream.

on:
  workflow_dispatch:
  push:
    branches:
      - feature/lark-oauth-provider

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: jobyinc
  IMAGE_TAG: lark-stable

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            dockerfile: apps/api/Dockerfile.api
            image: plane-backend
          - name: frontend
            dockerfile: apps/web/Dockerfile.web
            image: plane-frontend
          - name: admin
            dockerfile: apps/admin/Dockerfile.admin
            image: plane-admin
          - name: space
            dockerfile: apps/space/Dockerfile.space
            image: plane-space

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          platforms: linux/amd64
